<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#4834d4"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ddd"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Signal waves -->
  <circle cx="256" cy="200" r="160" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="12"/>
  <circle cx="256" cy="200" r="120" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="12"/>
  <circle cx="256" cy="200" r="80" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="12"/>
  <!-- Tower body -->
  <rect x="240" y="140" width="32" height="220" rx="4" fill="url(#tower)"/>
  <!-- Tower arms -->
  <rect x="210" y="180" width="92" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="220" y="220" width="72" height="6" rx="3" fill="white" opacity="0.8"/>
  <!-- Antenna top -->
  <circle cx="256" cy="130" r="14" fill="white"/>
  <rect x="252" y="116" width="8" height="30" rx="4" fill="white"/>
  <!-- Base -->
  <path d="M220 360 L292 360 L280 380 L232 380 Z" fill="white" opacity="0.9"/>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">SignalRadar</text>
</svg>