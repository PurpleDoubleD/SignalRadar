<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SignalRadar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        #map {
            width: 100%;
            height: 100vh;
            z-index: 1;
        }
        
        /* Top bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0.7) 100%);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .top-bar h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .top-bar .signal-info {
            font-size: 12px;
            color: #a0a0b0;
        }
        
        /* Bottom panel */
        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: linear-gradient(0deg, rgba(26,26,46,0.98) 0%, rgba(26,26,46,0.85) 100%);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-top: 1px solid rgba(108,92,231,0.3);
        }
        
        .signal-meter {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .signal-bars {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 24px;
        }
        
        .signal-bar {
            width: 6px;
            border-radius: 2px;
            background: #333;
            transition: background 0.3s;
        }
        
        .signal-bar:nth-child(1) { height: 6px; }
        .signal-bar:nth-child(2) { height: 10px; }
        .signal-bar:nth-child(3) { height: 14px; }
        .signal-bar:nth-child(4) { height: 18px; }
        .signal-bar:nth-child(5) { height: 24px; }
        
        .signal-bar.active.excellent { background: #00b894; }
        .signal-bar.active.good { background: #fdcb6e; }
        .signal-bar.active.fair { background: #e17055; }
        .signal-bar.active.poor { background: #d63031; }
        
        .signal-text {
            flex: 1;
        }
        
        .signal-text .strength {
            font-size: 16px;
            font-weight: 600;
        }
        
        .signal-text .detail {
            font-size: 11px;
            color: #a0a0b0;
        }
        
        .legend {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #a0a0b0;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        /* Control buttons */
        .controls {
            position: fixed;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .ctrl-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(108,92,231,0.3);
            background: rgba(26,26,46,0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .ctrl-btn:active {
            background: rgba(108,92,231,0.4);
            transform: scale(0.95);
        }
        
        .ctrl-btn.active {
            background: rgba(108,92,231,0.5);
            border-color: #6c5ce7;
        }
        
        /* Tower popup */
        .tower-popup {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            line-height: 1.4;
        }
        
        .tower-popup .tp-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .tower-popup .tp-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        
        .tower-popup .tp-label {
            color: #666;
        }
        
        /* Loading overlay */
        .loading {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(108,92,231,0.9);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        /* Heatmap canvas overlay */
        .heatmap-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 400;
            pointer-events: none;
            opacity: 0.45;
        }
        
        /* Leaflet overrides */
        .leaflet-control-zoom { display: none !important; }
        .leaflet-control-attribution { 
            font-size: 9px !important;
            background: rgba(26,26,46,0.7) !important;
            color: #666 !important;
        }
        .leaflet-control-attribution a { color: #6c5ce7 !important; }
        
        /* Tower markers */
        .tower-marker {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
        }
        
        .tower-marker.telefonica { background: #0066cc; }
        .tower-marker.telekom { background: #e20074; }
        .tower-marker.vodafone { background: #e60000; }
        .tower-marker.drillisch { background: #6c5ce7; }
        .tower-marker.other { background: #888; }
        
        /* User location marker */
        .user-marker {
            width: 18px;
            height: 18px;
            background: #6c5ce7;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(108,92,231,0.3), 0 0 12px rgba(108,92,231,0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 4px rgba(108,92,231,0.3), 0 0 12px rgba(108,92,231,0.5); }
            50% { box-shadow: 0 0 0 8px rgba(108,92,231,0.1), 0 0 20px rgba(108,92,231,0.3); }
            100% { box-shadow: 0 0 0 4px rgba(108,92,231,0.3), 0 0 12px rgba(108,92,231,0.5); }
        }
        
        /* Network type badge */
        .network-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 4px;
        }
        
        .network-badge.n5g { background: #6c5ce7; color: #fff; }
        .network-badge.n4g { background: #00b894; color: #fff; }
        .network-badge.n3g { background: #fdcb6e; color: #333; }
        .network-badge.n2g { background: #d63031; color: #fff; }
        
        /* Filter buttons */
        .filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .filter-btn {
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #a0a0b0;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: rgba(108,92,231,0.3);
            border-color: #6c5ce7;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Top bar -->
    <div class="top-bar">
        <div>
            <h1>📡 SignalRadar</h1>
            <div class="signal-info" id="coordsDisplay">Standort wird ermittelt...</div>
        </div>
        <div id="towerCount" style="font-size: 12px; color: #a0a0b0;">-- Masten</div>
    </div>
    
    <!-- Loading indicator -->
    <div class="loading" id="loading">Lade Funkmasten...</div>
    
    <!-- Map -->
    <div id="map"></div>
    
    <!-- Controls -->
    <div class="controls">
        <button class="ctrl-btn" id="btnLocate" title="Mein Standort">📍</button>
        <button class="ctrl-btn" id="btnSatellite" title="Satellitenkarte">🛰️</button>
        <button class="ctrl-btn" id="btnHeatmap" title="Signal-Heatmap">🌡️</button>
        <button class="ctrl-btn" id="btnMeasure" title="Messen">📏</button>
    </div>
    
    <!-- Bottom panel -->
    <div class="bottom-panel">
        <div class="filter-row">
            <button class="filter-btn active" data-filter="all">Alle</button>
            <button class="filter-btn" data-filter="telefonica">O2/1&1</button>
            <button class="filter-btn" data-filter="telekom">Telekom</button>
            <button class="filter-btn" data-filter="vodafone">Vodafone</button>
        </div>
        <div class="signal-meter">
            <div class="signal-bars" id="signalBars">
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
            </div>
            <div class="signal-text">
                <div class="strength" id="signalStrength">Tippe auf die Karte</div>
                <div class="detail" id="signalDetail">Signal wird berechnet basierend auf Mastnaehe</div>
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#00b894"></div>Stark (&gt;-70dBm)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#fdcb6e"></div>Gut (-70 bis -85)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e17055"></div>Schwach (-85 bis -100)</div>
            <div class="legend-item"><div class="legend-dot" style="background:#d63031"></div>Sehr schwach (&lt;-100)</div>
        </div>
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
